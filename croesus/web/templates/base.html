<!doctype html>
<html lang="ko" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F4EFE4" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#15130F" media="(prefers-color-scheme: dark)">
  <title>{{ title }} · Croesus</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23C2A14A'/%3E%3Ccircle cx='16' cy='16' r='14' fill='none' stroke='%239A7616' stroke-width='2'/%3E%3Ctext x='16' y='22' font-size='16' text-anchor='middle' fill='%23211E18' font-family='Georgia,serif' font-weight='bold'%3EC%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="/static/js/htmx.min.js" defer></script>
  <script src="/static/js/echarts.min.js" defer></script>
  <script src="/static/js/charts.js" defer></script>
</head>
<body>
  {% set p = request.url.path %}
  <header class="topbar">
    <a href="/" class="brand"><span class="coin" aria-hidden="true"></span>Croesus</a>
    <span class="stamp">{{ today() }}</span>
  </header>
  <main class="container fade">{% block content %}{% endblock %}</main>
  <nav class="tabbar" aria-label="주요 메뉴">
    <a href="/"              {% if p == '/' %}aria-current="page"{% endif %}><span class="ic" aria-hidden="true">⌂</span>홈</a>
    <a href="/macro"         {% if p.startswith('/macro') %}aria-current="page"{% endif %}><span class="ic" aria-hidden="true">◴</span>매크로</a>
    <a href="/screening"     {% if p.startswith('/screening') %}aria-current="page"{% endif %}><span class="ic" aria-hidden="true">▦</span>스크리닝</a>
    <a href="/portfolio"     {% if p.startswith('/portfolio') %}aria-current="page"{% endif %}><span class="ic" aria-hidden="true">◑</span>포트폴리오</a>
    <a href="/opportunities" {% if p.startswith('/opportunities') %}aria-current="page"{% endif %}><span class="ic" aria-hidden="true">◇</span>기회</a>
    <a href="/settings/profile" {% if p.startswith('/settings') %}aria-current="page"{% endif %}><span class="ic" aria-hidden="true">⚙</span>설정</a>
  </nav>
</body>
</html>
