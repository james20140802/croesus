# Macro Score Engine configuration
# Weights and thresholds are empirical initial estimates; validate empirically after sufficient history.

amplifier:
  category_weights:
    liquidity: 0.35
    credit: 0.40
    rates: 0.25

positioning_thresholds:
  # Rules evaluated in order; first match wins.
  # Most-specific stress cases first, then best-case growth, then defaults.
  - condition: {regime: Stagflation, amplifier_min: 61}
    positioning: Defensive
  - condition: {confirmation_max: -0.5}
    positioning: Defensive
  - condition: {regime: Stagflation}
    positioning: Cautious
  - condition: {amplifier_min: 61}
    positioning: Cautious
  - condition: {regime: Goldilocks, amplifier_max: 30, confirmation_min: 0.3}
    positioning: Aggressive
  - condition: {regime: Goldilocks, amplifier_max: 60}
    positioning: Moderately Aggressive
  - condition: {regime: Reflation}
    positioning: Neutral
  - condition: {amplifier_min: 31, amplifier_max: 60}
    positioning: Neutral
  - condition: {}
    positioning: Neutral

screening:
  # Sprint 005b refinements ────────────────────────────────────────────────
  # How MacroState deltas map onto base weights/filters:
  #   discrete   = additive regime delta at full strength (pre-005b behavior)
  #   continuous = linear interpolation by stress (amplifier_score / 100)
  interpolation: discrete
  # Momentum percentile input: raw factor values, or momentum / volatility_3m.
  momentum_scaling: raw
  # Postures in which `above_200d_ma` becomes an eligibility gate rather than a
  # weighted score component. Empty list disables the gate.
  trend_gate_postures:
    - Cautious
    - Defensive
  base_candidate_count: 20
  # Sprint 008b: a valuation dimension joins the composite. Its 0.10 weight is
  # redistributed out of trend (0.25 -> 0.15) so the positive-weight total
  # stays 0.85 and scores remain on the pre-008b scale.
  base_weights:
    momentum: 0.35
    liquidity: 0.25
    trend: 0.15
    valuation: 0.10
    volatility_penalty: 0.15
  # Weighting of momentum horizons inside momentum_score. 1m acts as a
  # short-term reversal signal, so it is downweighted relative to 3m/6m.
  # Unset/empty => equal-average of available horizons (pre-005b behavior).
  base_momentum_horizon_weights:
    momentum_1m: 0.2
    momentum_3m: 0.3
    momentum_6m: 0.5
  regime_overrides:
    Goldilocks:
      momentum: 0.10
      volatility_penalty: -0.05
      # Risk-on growth regime: momentum leads, cheapness matters less.
      valuation: -0.05
    Reflation:
      momentum: -0.05
      liquidity: 0.10
    Stagflation:
      momentum: -0.15
      volatility_penalty: 0.15
      # Stress regime: lean defensive — favor cheap names over chased momentum.
      valuation: 0.10
      # Stress regime: drop the 1m reversal horizon, lean on 6m trend.
      momentum_horizon_weights:
        momentum_1m: 0.0
        momentum_3m: 0.3
        momentum_6m: 0.7
    Deflation:
      momentum: -0.10
      liquidity: 0.05
      valuation: 0.05
  amplifier_stress_threshold: 60
  amplifier_stress_filters:
    min_liquidity_multiplier: 1.5
    max_volatility_multiplier: 0.8
    min_market_cap_multiplier: 2.0
